# ──────────────────────────────────────────────────────────────────────────────
# Interceptor - application.properties
# ──────────────────────────────────────────────────────────────────────────────

# ── Company ──────────────────────────────────────────────────────────────────
app.prop.company-name=Acme Corp

# ── Agent (resolved from JWT claims) ─────────────────────────────────────────
# "agent-id" is extracted from the JWT claim at runtime.
# No static config needed here for agent fields.

# ── Resource ─────────────────────────────────────────────────────────────────
app.prop.resource-type=POSTGRESQL
app.prop.resource-id=db-prod-01
app.prop.environment=PRODUCTION
app.prop.region=ap-south-1
app.prop.availability-zone=ap-south-1a

# ── Spring Security (disable default login page for dev) ─────────────────────
spring.security.user.name=dev
spring.security.user.password=dev